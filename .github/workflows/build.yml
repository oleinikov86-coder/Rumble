name: Build Rumble IPA

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true
          cache-dir-theos: ${{ github.workspace }}/theos
          cache-dir-sdks: ${{ github.workspace }}/theos/sdks

      - name: Build IPA
        run: |
          rm -f packages/*
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: List packages
        run: ls -la packages/ || echo "No packages dir"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-IPA
          path: packages/*
